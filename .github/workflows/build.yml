name: Build ISO

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Valo Linux ISO
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install live-build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            debhelper \
            devscripts \
            dpkg-dev \
            gnupg \
            live-build \
            xorriso \
            isolinux \
            syslinux-common \
            syslinux-utils \
            squashfs-tools \
            debian-archive-keyring

      - name: Patch Ubuntu live-build Contents path
        run: |
          sudo sed -i \
            's|${LB_PARENT_MIRROR_CHROOT}/dists/${LB_PARENT_DISTRIBUTION}/Contents-${LB_ARCHITECTURES}.gz|${LB_PARENT_MIRROR_CHROOT}/dists/${LB_PARENT_DISTRIBUTION}/main/Contents-${LB_ARCHITECTURES}.gz|' \
            /usr/lib/live/build/lb_chroot_linux-image

      - name: Validate Debian package list
        run: |
          docker run --rm \
            -v "$PWD:/work:ro" \
            -w /work \
            debian:trixie-slim \
            bash -euxc '
              sed -i "s/Components: main/Components: main contrib non-free-firmware/" /etc/apt/sources.list.d/debian.sources
              apt-get update
              missing=""
              while read -r package
              do
                if ! apt-cache show "$package" >/dev/null 2>&1
                then
                  missing="${missing} ${package}"
                fi
              done < <(
                sed "s/#.*//" config/package-lists/*.list.chroot |
                  sed "/^[[:space:]]*$/d" |
                  grep -v "^valo-"
              )

              if [ -n "$missing" ]
              then
                echo "Missing Debian packages:${missing}" >&2
                exit 1
              fi
            '

      - name: Build Valo packages
        run: |
          find packages -path '*/debian/rules' -exec chmod +x {} \;
          find packages -path '*/debian/postinst' -exec chmod +x {} \;
          for package_dir in \
            packages/valo-keyring \
            packages/valo-release \
            packages/valo-defaults
          do
            (cd "$package_dir" && dpkg-buildpackage -us -uc -b)
          done
          cp packages/*.deb config/packages.chroot/

      - name: Configure live-build
        run: |
          sudo lb config \
            --mode debian \
            --distribution trixie \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --debian-installer live \
            --initsystem systemd \
            --apt-secure false \
            --apt-options "--yes -o Acquire::AllowInsecureRepositories=true -o Acquire::AllowDowngradeToInsecureRepositories=true -o APT::Get::AllowUnauthenticated=true" \
            --security false \
            --archive-areas "main contrib non-free-firmware" \
            --iso-application "Valo Linux" \
            --iso-publisher "Valo Linux" \
            --iso-volume "Valo Linux ${GITHUB_REF_NAME}"
          sudo sed -i 's/^LB_BOOTSTRAP_INCLUDE=.*/LB_BOOTSTRAP_INCLUDE="gpg gnupg gpgv"/' config/bootstrap

      - name: Build ISO
        run: sudo lb build

      - name: Prepare release artifact
        run: |
          ISO="$(find . -maxdepth 1 -type f -name '*.iso' | head -n 1)"
          test -n "$ISO"
          cp "$ISO" "valo-linux-${GITHUB_REF_NAME}-amd64.iso"
          sha256sum "valo-linux-${GITHUB_REF_NAME}-amd64.iso" > "valo-linux-${GITHUB_REF_NAME}-amd64.iso.sha256"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "Valo Linux ${TAG_NAME}" \
              --notes "Automated Valo Linux ISO build for ${TAG_NAME}."
          fi

          gh release upload "$TAG_NAME" \
            "valo-linux-${TAG_NAME}-amd64.iso" \
            "valo-linux-${TAG_NAME}-amd64.iso.sha256" \
            --clobber
